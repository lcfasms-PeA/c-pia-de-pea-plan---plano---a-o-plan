version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pea-plan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pea_plan_dev
      MYSQL_USER: pea_plan
      MYSQL_PASSWORD: pea_plan123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - pea-plan-network

  app:
    build: .
    container_name: pea-plan-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://pea_plan:pea_plan123@mysql:3306/pea_plan_dev
      JWT_SECRET: docker-test-secret-key-change-in-production-32-chars-min
      VITE_APP_ID: pea-plan-docker-test
      OAUTH_SERVER_URL: http://localhost:8080
      OWNER_OPEN_ID: docker-owner-001
      BUILT_IN_FORGE_API_URL: http://localhost:5000/api
      BUILT_IN_FORGE_API_KEY: docker-api-key-test
      LLM_MODEL: gemini-2.5-flash
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pea-plan-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  pea-plan-network:
    driver: bridge
